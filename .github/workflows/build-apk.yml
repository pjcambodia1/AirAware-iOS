name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build AirAware Signed APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform if missing
        run: |
          if [ ! -f "android/gradlew" ]; then
            rm -rf android
            npx cap add android
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Restore AndroidManifest permissions
        run: |
          mkdir -p android/app/src/main
          cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.CAMERA" />

              <uses-feature android:name="android.hardware.camera" android:required="false" />
              <uses-feature android:name="android.hardware.camera.autofocus" android:required="false" />
              <uses-feature android:name="android.hardware.location.gps" android:required="false" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:label="AirAware"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:label="AirAware"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode|navigation">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Restore MainActivity
        run: |
          mkdir -p android/app/src/main/java/com/airaware/app
          cat > android/app/src/main/java/com/airaware/app/MainActivity.java <<'EOF'
          package com.airaware.app;

          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {}
          EOF

      - name: Restore Android resources
        run: |
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/xml

          cat > android/app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">AirAware</string>
              <string name="title_activity_main">AirAware</string>
              <string name="package_name">com.airaware.app</string>
              <string name="custom_url_scheme">com.airaware.app</string>
          </resources>
          EOF

          cat > android/app/src/main/res/xml/file_paths.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths xmlns:android="http://schemas.android.com/apk/res/android">
              <external-path name="external_files" path="." />
          </paths>
          EOF

      - name: Force install AirAware launcher icon
        run: |
          if [ ! -f "www/airaware-icon.png" ]; then
            echo "ERROR: www/airaware-icon.png not found"
            exit 1
          fi

          rm -rf android/app/src/main/res/mipmap-anydpi-v26

          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          cp www/airaware-icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp www/airaware-icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp www/airaware-icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp www/airaware-icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp www/airaware-icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp www/airaware-icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp www/airaware-icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp www/airaware-icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp www/airaware-icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp www/airaware-icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Verify permissions and icon
        run: |
          grep -n "ACCESS_FINE_LOCATION" android/app/src/main/AndroidManifest.xml
          grep -n "ACCESS_COARSE_LOCATION" android/app/src/main/AndroidManifest.xml
          grep -n "CAMERA" android/app/src/main/AndroidManifest.xml
          grep -n "INTERNET" android/app/src/main/AndroidManifest.xml
          ls -lh android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          ls -lh android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          ls -lh android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          ls -lh android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          ls -lh android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/airaware-release.keystore

      - name: Export signing environment variables
        run: |
          echo "KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Verify keystore exists
        run: |
          test -f android/app/airaware-release.keystore
          ls -lh android/app/airaware-release.keystore

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign release APK manually
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)

          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED_APK="android/app/build/outputs/apk/release/AirAware-release-signed.apk"

          test -f "$UNSIGNED_APK"

          "$BUILD_TOOLS/zipalign" -p -f 4 "$UNSIGNED_APK" "$ALIGNED_APK"

          "$BUILD_TOOLS/apksigner" sign \
            --ks android/app/airaware-release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          "$BUILD_TOOLS/apksigner" verify --verbose "$SIGNED_APK"

      - name: Verify signed APK output
        run: |
          ls -lh android/app/build/outputs/apk/release/
          test -f android/app/build/outputs/apk/release/AirAware-release-signed.apk

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AirAware-release-signed-apk
          path: android/app/build/outputs/apk/release/AirAware-release-signed.apk
