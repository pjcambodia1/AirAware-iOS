workflows:
  airaware-ios-testflight:
    name: AirAware iOS TestFlight

    environment:
      node: 22
      xcode: latest

    integrations:
      app_store_connect: Codemagic-AirAware

    scripts:
      - npm install --legacy-peer-deps
      - npm install @capacitor/core @capacitor/cli @capacitor/ios --legacy-peer-deps
      - npm run build || true
      - rm -rf ios
      - npx cap add ios || true
      - npx cap sync ios
      - xcode-project use-profiles
      - xcode-project build-ipa \
          --project ios/App/App.xcodeproj \
          --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
