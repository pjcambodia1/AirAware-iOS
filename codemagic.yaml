workflows:
  airaware-ios:
    name: AirAware iOS Cloud Setup Check
    environment:
      node: 22
    scripts:
      - npm install
      - npm install @capacitor/core @capacitor/cli @capacitor/ios
      - npm run build || true
      - npx cap add ios
      - npx cap sync ios
      - echo "Repo files:" && ls -la
      - echo "iOS files:" && find ios -maxdepth 3 -type f | sort
